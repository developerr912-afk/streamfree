<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>StreamVerse – Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

  <div id="toast" class="toast"></div>
  <div id="confirmModal" class="modal-confirm"><div class="modal-box"><h3>Are you sure?</h3><p style="opacity:0.7;font-size:0.95rem;">This action cannot be undone.</p><div class="actions"><button class="btn-secondary" onclick="closeConfirm()">Cancel</button><button id="confirmDeleteBtn" class="btn-danger">Delete</button></div></div></div>

  <div style="padding:16px 20px;">
    <button onclick="goToHome()" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">
      <i class="fas fa-arrow-left"></i> Back to Home
    </button>
  </div>

  <div id="page-admin" style="padding:0 20px 80px;"></div>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        if (window._confirmCb) window._confirmCb();
        closeConfirm();
      });
    });
  </script>
</body>
</html>
